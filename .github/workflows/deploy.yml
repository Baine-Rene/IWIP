name: Deploy IWP Landing

on:
  push:
    branches:
      - dev # Staging
      - main # Production
  workflow_dispatch:

env:
  IMAGE_NAME: iwp-landing
  SSH_PORT: "45236"

jobs:
  checks:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    needs: checks
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging

    env:
      CONTAINER_PORT: 4006

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg APP_PORT=4006 \
            -t ${{ env.IMAGE_NAME }}:staging \
            .

      - name: Save Docker Image
        run: |
          docker save ${{ env.IMAGE_NAME }}:staging | gzip > image.tar.gz

      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Image to Server
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} "mkdir -p ${{ vars.STAGING_APP_PATH }}"
          scp -P ${{ env.SSH_PORT }} image.tar.gz ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.STAGING_APP_PATH }}/image.tar.gz

      - name: Deploy Container
        run: |
          ssh -p ${{ env.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} << 'ENDSSH'
            set -e

            PROJECT_DIR="${{ vars.STAGING_APP_PATH }}"
            IMAGE="${{ env.IMAGE_NAME }}:staging"
            CONTAINER="iwp-landing-staging"
            PORT=4006

            cd ${PROJECT_DIR}

            # Load image
            docker load < image.tar.gz
            rm -f image.tar.gz

            # Stop and remove existing container
            docker stop ${CONTAINER} 2>/dev/null || true
            docker rm ${CONTAINER} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${CONTAINER} \
              --restart unless-stopped \
              -p ${PORT}:${PORT} \
              ${IMAGE}

            # Cleanup old images
            docker image prune -f

            echo "Staging deployment completed: ${CONTAINER} on port ${PORT}"
          ENDSSH

  deploy-production:
    name: Deploy to Production
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    env:
      CONTAINER_PORT: 4007

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg APP_PORT=4007 \
            -t ${{ env.IMAGE_NAME }}:production \
            .

      - name: Save Docker Image
        run: |
          docker save ${{ env.IMAGE_NAME }}:production | gzip > image.tar.gz

      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Image to Server
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} "mkdir -p ${{ vars.PROJECT_PATH }}"
          scp -P ${{ env.SSH_PORT }} image.tar.gz ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.PROJECT_PATH }}/image.tar.gz

      - name: Deploy Container
        run: |
          ssh -p ${{ env.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} << 'ENDSSH'
            set -e

            PROJECT_DIR="${{ vars.PROJECT_PATH }}"
            IMAGE="${{ env.IMAGE_NAME }}:production"
            CONTAINER="iwp-landing-production"
            PORT=4007

            cd ${PROJECT_DIR}

            # Load image
            docker load < image.tar.gz
            rm -f image.tar.gz

            # Stop and remove existing container
            docker stop ${CONTAINER} 2>/dev/null || true
            docker rm ${CONTAINER} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${CONTAINER} \
              --restart unless-stopped \
              -p ${PORT}:${PORT} \
              ${IMAGE}

            # Cleanup old images
            docker image prune -f

            echo "Production deployment completed: ${CONTAINER} on port ${PORT}"
          ENDSSH
